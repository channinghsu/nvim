name: cherry-pick upstream

# NOTE: To enable pushing to workflows that modify .github/workflows/ files,
# you need to use a Personal Access Token (PAT) with appropriate permissions
# instead of GITHUB_TOKEN. Follow these steps:
#
# 1. Create a PAT at https://github.com/settings/tokens/new with these scopes:
#    - repo (full control of private repositories)
#    - workflow (update GitHub Action workflows)
#
# 2. Add it as a repository secret named 'WORKFLOW_PAT'
#
# 3. Uncomment the line below and use it instead of GITHUB_TOKEN:
#    token: ${{ secrets.WORKFLOW_PAT }}
#
# For now, push failures due to workflow modifications are ignored with continue-on-error

on:
  # Manual trigger - go to Actions tab and click "Run workflow"
  workflow_dispatch:
  schedule: [{ cron: "0 13 * * *" }]

concurrency:
  group: cherry-pick-upstream
  cancel-in-progress: false

jobs:
  cherry-pick-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          if ! git remote | grep -q upstream; then
            git remote add upstream https://github.com/ayamir/nvimdots.git
          fi
          git fetch upstream main

      - name: Cherry-pick upstream commits
        id: cherry_pick
        run: |
          echo "Fetching recent commits from upstream/main"

          # 获取 upstream/main 最近 50 个提交（排除 github-actions[bot]）
          COMMITS=$(git log --reverse --pretty=format:"%H %an" upstream/main -5 | grep -v "github-actions\[bot\]" | awk '{print $1}' || true)

          if [ -z "$COMMITS" ]; then
            echo "No commits to cherry-pick"
            echo "status=no_commits" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found $(echo "$COMMITS" | wc -l) commits from upstream"

          # 创建临时文件
          CONFLICT_FILE="/tmp/conflicts.txt"
          SUCCESS_FILE="/tmp/success.txt"

          # 逐个 cherry-pick，跳过已存在的提交
          CHERRY_PICKED=0
          CONFLICTS=0
          SKIPPED=0

          for commit in $COMMITS; do
            # 检查该提交是否已经存在于当前分支
            if git branch --contains $commit 2>/dev/null | grep -q "^\*"; then
              echo "⊘ Skipping $commit (already in current branch)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # 获取提交信息
            COMMIT_MSG=$(git log --format=%s -n 1 $commit)
            COMMIT_AUTHOR=$(git log --format=%an -n 1 $commit)

            echo "Cherry-picking $commit: $COMMIT_MSG"
            if git cherry-pick $commit 2>&1; then
              CHERRY_PICKED=$((CHERRY_PICKED + 1))
              echo "✓ Successfully cherry-picked $commit"
              echo "- ✅ [\`${commit:0:7}\`](https://github.com/ayamir/nvimdots/commit/$commit) $COMMIT_MSG" >> $SUCCESS_FILE
            else
              # 检查是否是因为内容已存在导致的失败
              if git status | grep -q "nothing to commit"; then
                echo "⊘ Content already exists for $commit"
                SKIPPED=$((SKIPPED + 1))
                git cherry-pick --abort 2>&1 || true
              else
                echo "✗ Conflict detected for $commit"
                
                # 自动跳过有冲突的提交
                echo "⊘ Skipping conflicted commit automatically"
                SKIPPED=$((SKIPPED + 1))
                
                git cherry-pick --abort 2>&1 || true
              fi
            fi
          done

          echo "Summary: $CHERRY_PICKED commits cherry-picked, $SKIPPED skipped, $CONFLICTS conflicts"

          # 只有在有成功或失败的提交时才生成报告
          if [ $CHERRY_PICKED -gt 0 ] || [ $CONFLICTS -gt 0 ]; then
            REPORT_FILE="/tmp/sync_report.md"
            echo "# 🔄 Upstream Sync Report" > $REPORT_FILE
            echo "" >> $REPORT_FILE
            echo "**Sync Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $REPORT_FILE
            echo "**Workflow Run:** [\#$GITHUB_RUN_ID](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)" >> $REPORT_FILE
            echo "" >> $REPORT_FILE

            echo "## 📊 Summary" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            echo "| Status | Count |" >> $REPORT_FILE
            echo "|--------|-------|" >> $REPORT_FILE
            echo "| ✅ Successfully Cherry-picked | $CHERRY_PICKED |" >> $REPORT_FILE
            echo "| ⊘ Skipped (Already exists) | $SKIPPED |" >> $REPORT_FILE
            echo "| ❌ Conflicts | $CONFLICTS |" >> $REPORT_FILE
            echo "" >> $REPORT_FILE

            if [ -f $SUCCESS_FILE ]; then
              echo "## ✅ Successfully Cherry-picked Commits" >> $REPORT_FILE
              echo "" >> $REPORT_FILE
              cat $SUCCESS_FILE >> $REPORT_FILE
              echo "" >> $REPORT_FILE
            fi

            if [ -f $CONFLICT_FILE ]; then
              echo "## ⚠️ Conflicted Commits (Skipped)" >> $REPORT_FILE
              echo "" >> $REPORT_FILE
              echo "> These commits could not be applied due to conflicts and require manual intervention." >> $REPORT_FILE
              echo "" >> $REPORT_FILE
              cat $CONFLICT_FILE >> $REPORT_FILE
              echo "" >> $REPORT_FILE
            fi
          fi

          # 输出状态
          if [ $CHERRY_PICKED -eq 0 ] && [ $CONFLICTS -eq 0 ]; then
            echo "status=no_changes" >> $GITHUB_OUTPUT
            exit 0
          elif [ $CONFLICTS -gt 0 ]; then
            echo "status=partial_success" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

          echo "cherry_picked=$CHERRY_PICKED" >> $GITHUB_OUTPUT
          echo "conflicts=$CONFLICTS" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

      - name: Push changes
        id: push
        run: |
          if git diff --quiet origin/main; then
            echo "No changes to push"
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            # Fetch latest remote state
            git fetch origin main
            
            # Try to rebase, if it fails, abort and try direct push
            if ! git rebase origin/main; then
              echo "Rebase failed, aborting rebase"
              git rebase --abort
              
              # Reset any changes to workflow files to avoid permission issues
              git checkout origin/main -- .github/workflows/ 2>/dev/null || true
              git add .github/workflows/
              
              # Try force with lease as fallback
              if git push --force-with-lease origin main; then
                echo "pushed=true" >> $GITHUB_OUTPUT
              else
                echo "pushed=false" >> $GITHUB_OUTPUT
              fi
            else
              # Rebase succeeded
              # Reset any changes to workflow files to avoid permission issues
              git checkout origin/main -- .github/workflows/ 2>/dev/null || true
              git add .github/workflows/
              
              # Do normal push
              if git push origin main; then
                echo "pushed=true" >> $GITHUB_OUTPUT
              else
                echo "pushed=false" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Create sync report issue
        if: steps.cherry_pick.outputs.status == 'success' || steps.cherry_pick.outputs.status == 'partial_success'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const status = '${{ steps.cherry_pick.outputs.status }}';
            const cherryPicked = '${{ steps.cherry_pick.outputs.cherry_picked }}';
            const conflicts = '${{ steps.cherry_pick.outputs.conflicts }}';
            const skipped = '${{ steps.cherry_pick.outputs.skipped }}';
            const pushed = '${{ steps.push.outputs.pushed }}';

            let reportBody = '';
            try {
              reportBody = fs.readFileSync('/tmp/sync_report.md', 'utf8');
            } catch (error) {
              reportBody = '⚠️ Report file not found';
            }

            reportBody += '\n## 📤 Push Status\n\n';
            if (pushed === 'true') {
              reportBody += '✅ Changes have been pushed to main branch\n';
            } else {
              reportBody += '⊘ No changes to push\n';
            }

            let title, labels;
            if (status === 'success') {
              title = `✅ Upstream Sync Successful - ${cherryPicked} commits applied`;
              labels = ['upstream-sync', 'success'];
            } else if (status === 'partial_success') {
              title = `⚠️ Upstream Sync Partial - ${cherryPicked} applied, ${conflicts} conflicts`;
              labels = ['upstream-sync', 'conflicts', 'attention-needed'];
            } else {
              title = `ℹ️ Upstream Sync - No new changes`;
              labels = ['upstream-sync', 'no-changes'];
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: reportBody,
              labels: labels
            });
